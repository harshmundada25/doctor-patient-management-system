server.port=8080

spring.application.name=doctor-patient-management-system

spring.datasource.url=${DB_URL:jdbc:h2:mem:doctor_patient_db;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true

spring.sql.init.mode=never

spring.jackson.serialization.write-dates-as-timestamps=false

app.jwt.secret=QmFja2VuZFRva2VuU2VjdXJpdHlLZXlGb3JEb2N0b3JQYXRpZW50TWFuYWdlbWVudFN5c3RlbTEyMzQ=
app.jwt.expiration-ms=86400000

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

management.endpoints.web.exposure.include=health,info